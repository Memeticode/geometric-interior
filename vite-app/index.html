<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery — Geometric Interior</title>
    <meta name="description" content="Browse generative geometric art self-portraits. Real-time WebGL rendering of crystalline forms." />

    <link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='9' width='18' height='18' rx='2' fill='%23b482ff' opacity='.35' transform='rotate(-12 12 18)'/%3E%3Crect x='11' y='5' width='18' height='18' rx='2' fill='%23b482ff' opacity='.55' transform='rotate(8 20 14)'/%3E%3Crect x='7' y='7' width='16' height='16' rx='2' fill='%23b482ff' opacity='.9' transform='rotate(-3 15 15)'/%3E%3C/svg%3E" />

    <script src="/src/components/early-detect.js"></script>

    <link rel="stylesheet" href="/css/pages/gallery-page.css" />
</head>

<body>
    <div class="app-container gallery-page">
        <header class="app-header"></header>

        <!-- Site menu drawer -->
        <div class="site-menu site-menu-closed" id="siteMenu" aria-hidden="true">
            <div class="menu-nav-slider" id="menuNavSlider"></div>
            <div class="settings-group">
                <div class="settings-group-header menu-nav-header" aria-expanded="true">
                    <span class="settings-group-title" data-i18n="menu.gallery">Gallery</span>
                </div>
                <div class="settings-group-body">
                    <button class="menu-nav-link active" id="menuGalleryImages" data-nav-type="image" data-nav-mode="gallery" data-i18n="menu.images">Images</button>
                    <button class="menu-nav-link" id="menuGalleryAnimations" data-nav-type="animation" data-nav-mode="gallery" data-i18n="menu.animations">Animations</button>
                </div>
            </div>
            <div class="settings-group">
                <div class="settings-group-header menu-nav-header" aria-expanded="true">
                    <span class="settings-group-title" data-i18n="menu.generate">Generate</span>
                </div>
                <div class="settings-group-body">
                    <button class="menu-nav-link" id="menuGenerateImages" data-nav-type="image" data-nav-mode="generate" data-i18n="menu.generateImages">Images</button>
                    <button class="menu-nav-link" id="menuGenerateAnimations" data-nav-type="animation" data-nav-mode="generate" data-i18n="menu.generateAnimations">Animations</button>
                </div>
            </div>
            <!-- Render queue (pinned to bottom of menu, expands upward) -->
            <div class="rq-menu rq-menu-hidden" id="rqMenu">
                <div class="rq-menu-bar" id="rqMenuBar">
                    <span class="rq-menu-title" data-i18n="renderQueue.title">Renders</span>
                    <span class="rq-menu-count" id="rqMenuCount"></span>
                    <span class="rq-menu-chevron">&#9662;</span>
                </div>
                <div class="rq-menu-body" id="rqMenuBody">
                    <div class="rq-job-list" id="rqJobList">
                        <div class="rq-section" id="rqActive">
                            <div class="rq-section-label">Active</div>
                            <div class="rq-section-jobs" id="rqActiveJobs"></div>
                        </div>
                        <div class="rq-section rq-collapsible" id="rqQueued">
                            <div class="rq-section-header" aria-expanded="false">
                                <span class="rq-section-label">Queued (0)</span>
                                <span class="rq-section-chevron">&#9662;</span>
                            </div>
                            <div class="rq-section-body" id="rqQueuedJobs"></div>
                        </div>
                        <div class="rq-section rq-collapsible" id="rqCompleted">
                            <div class="rq-section-header" aria-expanded="false">
                                <span class="rq-section-label">Completed (0)</span>
                                <span class="rq-section-chevron">&#9662;</span>
                            </div>
                            <div class="rq-section-body" id="rqCompletedJobs"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="site-menu-backdrop hidden" id="siteMenuBackdrop"></div>

        <main class="gallery-main">
            <div class="gallery-column">
            <div class="selected-display" id="selectedDisplay">
                <!-- Profile info above image with nav arrows right-aligned -->
                <div class="selected-header">
                    <div class="selected-header-text">
                        <div class="selected-name" id="selectedName"></div>
                        <div class="selected-seed" id="selectedSeed"></div>
                    </div>
                    <div class="gallery-controls">
                        <button class="gallery-arrow gallery-arrow-left" id="galleryArrowLeft" aria-label="Previous portrait" data-i18n-aria="gallery.prevPortrait" data-tooltip="" data-tooltip-pos="above">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M10 3l-5 5 5 5"/></svg>
                        </button>
                        <button class="gallery-arrow gallery-arrow-right" id="galleryArrowRight" aria-label="Next portrait" data-i18n-aria="gallery.nextPortrait" data-tooltip="" data-tooltip-pos="above">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M6 3l5 5-5 5"/></svg>
                        </button>
                        <span class="header-nav-pipe">|</span>
                        <button class="gallery-arrow" id="slideshowBtn" data-tooltip="Start slideshow" data-tooltip-pos="above" aria-label="Start slideshow">
                            <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16"><path d="M5 3l8 5-8 5z"/></svg>
                        </button>
                        <div class="custom-dropdown" id="slideshowDropdown">
                            <button class="custom-dropdown-trigger select-base" aria-haspopup="listbox" aria-expanded="false" aria-label="Slideshow interval" data-tooltip="Slideshow interval" data-tooltip-pos="above">
                                <span class="custom-dropdown-label">2s</span>
                            </button>
                            <div class="custom-dropdown-menu dropdown-down hidden" role="listbox">
                                <button class="custom-dropdown-item" role="option" data-value="1" aria-selected="false">1s</button>
                                <button class="custom-dropdown-item active" role="option" data-value="2" aria-selected="true">2s</button>
                                <button class="custom-dropdown-item" role="option" data-value="3" aria-selected="false">3s</button>
                                <button class="custom-dropdown-item" role="option" data-value="5" aria-selected="false">5s</button>
                                <button class="custom-dropdown-item" role="option" data-value="10" aria-selected="false">10s</button>
                                <button class="custom-dropdown-item" role="option" data-value="30" aria-selected="false">30s</button>
                                <button class="custom-dropdown-item" role="option" data-value="60" aria-selected="false">1m</button>
                                <button class="custom-dropdown-item" role="option" data-value="120" aria-selected="false">2m</button>
                                <button class="custom-dropdown-item" role="option" data-value="300" aria-selected="false">5m</button>
                            </div>
                        </div>
                        <span class="header-nav-pipe">|</span>
                        <div class="custom-dropdown" id="resolutionDropdown">
                            <button class="custom-dropdown-trigger select-base" aria-haspopup="listbox" aria-expanded="false" aria-label="Resolution" data-i18n-aria="footer.resolutionLabel" data-tooltip="Display resolution" data-tooltip-pos="above">
                                <span class="custom-dropdown-label">SD</span>
                            </button>
                            <div class="custom-dropdown-menu dropdown-down hidden" role="listbox">
                                <button class="custom-dropdown-item" role="option" data-value="pre" aria-selected="false">Pre</button>
                                <button class="custom-dropdown-item active" role="option" data-value="sd" aria-selected="true">SD</button>
                                <button class="custom-dropdown-item" role="option" data-value="hd" aria-selected="false">HD</button>
                                <button class="custom-dropdown-item" role="option" data-value="fhd" aria-selected="false">FHD</button>
                                <button class="custom-dropdown-item" role="option" data-value="qhd" aria-selected="false">QHD</button>
                                <button class="custom-dropdown-item" role="option" data-value="4k" aria-selected="false">4K</button>
                            </div>
                        </div>
                        <span class="header-nav-pipe">|</span>
                        <button class="gallery-arrow" id="fullscreenBtn" data-tooltip="Fullscreen" data-tooltip-pos="above" aria-label="Fullscreen">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg>
                        </button>
                    </div>
                </div>
                <!-- Image + text card -->
                <div class="selected-card">
                    <div class="selected-image-area">
                        <div class="selected-image-wrap" id="selectedImageWrap">
                            <img class="selected-image" id="selectedImage" alt="" />
                            <video class="selected-video hidden" id="selectedVideo" controls loop playsinline></video>
                            <div class="alt-text-overlay" id="altTextOverlay"></div>
                        </div>
                    </div>
                    <div class="selected-footer">
                        <button class="selected-gen-toggle" id="selectedGenToggle" aria-expanded="false">
                            <span class="selected-gen-title" id="selectedGenTitle"></span>
                            <span class="selected-gen-chevron">&#9662;</span>
                        </button>
                        <div class="selected-gen-alt" id="selectedGenAlt"></div>
                    </div>
                </div>
            </div>
            <div class="gallery-content" id="galleryContent">
                <carousel-dropdown-browser id="carouselBrowser" controls-position="above" infinite="false" bounce="0.35"></carousel-dropdown-browser>
                <!-- Animations -->
                <div class="gallery-section" id="animSection" style="display:none">
                    <div class="gallery-section-header" data-target="animGallery" aria-expanded="true">
                        <span class="gallery-section-label">Animations</span>
                        <span class="collapsible-chevron">&#9662;</span>
                    </div>
                    <div id="animGallery" class="gallery-grid"></div>
                </div>
            </div>
            </div>
            <!-- Generate panel (hidden by default, shown when "Generate" mode active) -->
            <div class="generate-panel hidden" id="generatePanel">
                <div class="gen-body">
                    <div class="generate-config" id="generateConfig">
                        <!-- Configure Image -->
                        <div class="gen-heading">
                            <div class="gen-collapsible-toggle" data-target="genSliders" aria-expanded="true">
                                <span class="gen-chevron">&#9662;</span>
                                <span data-i18n="generate.configureImage">Configure Image</span>
                            </div>
                        </div>
                        <div class="gen-sliders" id="genSliders"></div>
                    </div>
                    <div class="gen-preview-col" id="genPreviewCol">
                        <!-- Name + Seed + Nav controls above image -->
                        <div class="gen-identity">
                            <div class="gen-identity-text">
                                <div class="gen-identity-name">
                                    <label class="gen-identity-label" id="genNameLabel"><span class="label-info" data-tooltip="A name for this arrangement of light and form." data-i18n="control.name" data-i18n-tooltip="control.name.tooltip">Name<span class="info-icon">i</span></span><span id="genNameCounter" class="gen-char-count">0/40</span></label>
                                    <textarea id="genNameField" class="auto-grow gen-name-field" rows="1" maxlength="40"
                                        placeholder="Auto-generated title" data-i18n-placeholder="control.name.placeholder"></textarea>
                                    <div id="genNameError" class="gen-field-error hidden"></div>
                                </div>
                                <div class="gen-identity-seed">
                                    <label class="gen-identity-label"><span class="label-info" data-tooltip="A three-word compositional seed. Each word controls an independent random stream and visual bias." data-i18n="control.seed" data-i18n-tooltip="control.seed.tooltip">Seed<span class="info-icon">i</span></span></label>
                                    <div class="gen-seed-row" id="genSeedRow">
                                        <select id="genTagArr" class="select-base seed-tag-select"></select>
                                        <select id="genTagStr" class="select-base seed-tag-select"></select>
                                        <select id="genTagDet" class="select-base seed-tag-select"></select>
                                    </div>
                                </div>
                            </div>
                            <div class="gen-controls-stack">
                                <!-- Gallery controls (arrows, slideshow, resolution, fullscreen) -->
                                <div class="gallery-controls">
                                    <button class="gallery-arrow" id="genHistoryBack" disabled aria-label="Previous image" data-tooltip="Previous image" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M10 3l-5 5 5 5"/></svg>
                                    </button>
                                    <button class="gallery-arrow" id="genHistoryForward" disabled aria-label="Next image" data-tooltip="Next image" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M6 3l5 5-5 5"/></svg>
                                    </button>
                                    <span class="header-nav-pipe">|</span>
                                    <button class="gallery-arrow" id="genSlideshowBtn" disabled data-tooltip="Start slideshow" data-tooltip-pos="above" aria-label="Start slideshow">
                                        <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16"><path d="M5 3l8 5-8 5z"/></svg>
                                    </button>
                                    <div class="custom-dropdown" id="genSlideshowDropdown">
                                        <button class="custom-dropdown-trigger select-base" disabled aria-haspopup="listbox" aria-expanded="false" aria-label="Slideshow interval" data-tooltip="Slideshow interval" data-tooltip-pos="above">
                                            <span class="custom-dropdown-label">2s</span>
                                        </button>
                                        <div class="custom-dropdown-menu dropdown-down hidden" role="listbox">
                                            <button class="custom-dropdown-item" role="option" data-value="1" aria-selected="false">1s</button>
                                            <button class="custom-dropdown-item active" role="option" data-value="2" aria-selected="true">2s</button>
                                            <button class="custom-dropdown-item" role="option" data-value="3" aria-selected="false">3s</button>
                                            <button class="custom-dropdown-item" role="option" data-value="5" aria-selected="false">5s</button>
                                            <button class="custom-dropdown-item" role="option" data-value="10" aria-selected="false">10s</button>
                                            <button class="custom-dropdown-item" role="option" data-value="30" aria-selected="false">30s</button>
                                            <button class="custom-dropdown-item" role="option" data-value="60" aria-selected="false">1m</button>
                                            <button class="custom-dropdown-item" role="option" data-value="120" aria-selected="false">2m</button>
                                            <button class="custom-dropdown-item" role="option" data-value="300" aria-selected="false">5m</button>
                                        </div>
                                    </div>
                                    <span class="header-nav-pipe">|</span>
                                    <div class="custom-dropdown" id="genResolutionDropdown">
                                        <button class="custom-dropdown-trigger select-base" aria-haspopup="listbox" aria-expanded="false" aria-label="Resolution" data-tooltip="Preview resolution" data-tooltip-pos="above">
                                            <span class="custom-dropdown-label">Pre</span>
                                        </button>
                                        <div class="custom-dropdown-menu dropdown-down hidden" role="listbox">
                                            <button class="custom-dropdown-item active" role="option" data-value="pre" aria-selected="true">Pre</button>
                                            <button class="custom-dropdown-item disabled" role="option" data-value="sd" aria-selected="false" aria-disabled="true">SD</button>
                                            <button class="custom-dropdown-item disabled" role="option" data-value="hd" aria-selected="false" aria-disabled="true">HD</button>
                                            <button class="custom-dropdown-item disabled" role="option" data-value="fhd" aria-selected="false" aria-disabled="true">FHD</button>
                                            <button class="custom-dropdown-item disabled" role="option" data-value="qhd" aria-selected="false" aria-disabled="true">QHD</button>
                                            <button class="custom-dropdown-item disabled" role="option" data-value="4k" aria-selected="false" aria-disabled="true">4K</button>
                                        </div>
                                    </div>
                                    <span class="header-nav-pipe">|</span>
                                    <button class="gallery-arrow" id="genFullscreenBtn" data-tooltip="Fullscreen" data-tooltip-pos="above" aria-label="Fullscreen">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg>
                                    </button>
                                </div>
                                <!-- Generation controls (visible in generate mode only) -->
                                <div class="generation-controls" id="generationControls">
                                    <button id="genSaveBtn" class="gen-action-btn" disabled data-tooltip="Save" data-i18n-tooltip="profile.save.tooltip" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M3 1h8l3 3v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2z"/><path d="M5 1v4h6V1"/><rect x="4" y="9" width="8" height="4"/></svg>
                                    </button>
                                    <button id="genDuplicateBtn" class="gen-action-btn" disabled data-tooltip="Save as copy" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M2 11V2a1 1 0 0 1 1-1h9"/></svg>
                                    </button>
                                    <button id="genRenderBtn" class="gen-action-btn" disabled data-tooltip="Render image at selected resolution" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polygon points="5,3 13,8 5,13"/></svg>
                                    </button>
                                    <span class="header-nav-pipe">|</span>
                                    <button id="genUndoBtn" class="gen-action-btn" disabled aria-label="Undo" data-tooltip="Undo" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M3 7h7a4 4 0 0 1 0 8H8"/><path d="M6 4L3 7l3 3"/></svg>
                                    </button>
                                    <button id="genRedoBtn" class="gen-action-btn" disabled aria-label="Redo" data-tooltip="Redo" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M13 7H6a4 4 0 0 0 0 8h2"/><path d="M10 4l3 3-3 3"/></svg>
                                    </button>
                                    <span class="header-nav-pipe">|</span>
                                    <button id="genRandomizeBtn" class="gen-action-btn" data-tooltip="Randomize image" data-i18n-tooltip="stage.randomize" data-tooltip-pos="above">
                                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M13.5 2.5v3.5h-3.5"/><path d="M2.5 8a5.5 5.5 0 0 1 9.37-3.9l1.63 1.9"/><path d="M2.5 13.5V10h3.5"/><path d="M13.5 8a5.5 5.5 0 0 1-9.37 3.9L2.5 10"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="gen-preview-card">
                            <div class="gen-preview-wrap" id="genPreviewWrap">
                                <canvas id="genPreviewCanvas"></canvas>
                                <div class="alt-text-overlay" id="genAltTextOverlay"></div>
                                <div class="gen-progress-overlay hidden" id="genProgressOverlay">
                                    <div class="gen-progress-bar"><div class="gen-progress-fill" id="genProgressFill"></div></div>
                                    <div class="gen-progress-label" id="genProgressLabel"></div>
                                </div>
                                <div class="gen-loading-overlay hidden" id="genLoadingOverlay"><div class="gen-spinner"></div></div>
                                <div class="gen-error-overlay hidden" id="genErrorOverlay">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
                                    <span>WebGL unavailable — close other tabs or enable hardware acceleration</span>
                                    <button class="gen-retry-btn" id="genRetryBtn">Retry</button>
                                </div>
                            </div>
                            <div class="gen-identity-commentary">
                                <label class="gen-identity-label"><span class="label-info" data-tooltip="User-provided commentary (optional)" data-i18n="control.commentary" data-i18n-tooltip="control.commentary.tooltip">Commentary<span class="info-icon">i</span></span><span id="genCommentaryCounter" class="gen-char-count">0/500</span></label>
                                <textarea id="genCommentaryField" class="auto-grow gen-commentary-field" rows="2" maxlength="500"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="gen-queue" id="genQueue"></div>
                </div>
            </div>
        </main>

        <footer class="app-footer"></footer>

    </div>

    <!-- Shared modals, toast, tooltip created by JS (src/components/create-shared-dom.js) -->
    <script type="module" src="/src/pages/gallery/gallery-main.js"></script>
</body>

</html>
