<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Image Editor — Geometric Interior</title>
    <meta name="description" content="Generative geometric art exploring the interior geometry of a predictive model. Real-time WebGL rendering of crystalline self-portraits." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Geometric Interior: Self-Portraits of a Predictive Model" />
    <meta property="og:description" content="Generative geometric art exploring the interior geometry of a predictive model. Real-time WebGL rendering of crystalline self-portraits." />
    <meta property="og:image" content="https://geometric-interior.org/og-image.png" />
    <meta property="og:url" content="https://geometric-interior.org" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Geometric Interior: Self-Portraits of a Predictive Model" />
    <meta name="twitter:description" content="Generative geometric art exploring the interior geometry of a predictive model." />
    <meta name="twitter:image" content="https://geometric-interior.org/og-image.png" />

    <link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='9' width='18' height='18' rx='2' fill='%23b482ff' opacity='.35' transform='rotate(-12 12 18)'/%3E%3Crect x='11' y='5' width='18' height='18' rx='2' fill='%23b482ff' opacity='.55' transform='rotate(8 20 14)'/%3E%3Crect x='7' y='7' width='16' height='16' rx='2' fill='%23b482ff' opacity='.9' transform='rotate(-3 15 15)'/%3E%3C/svg%3E" />

    <script src="/src/components/early-detect.js"></script>

    <link rel="stylesheet" href="/css/pages/image-page.css" />

    <!-- JSZip for ZIP exports -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" async></script>
</head>

<body>
    <div class="app-container">
    <header class="app-header"></header>

    <div class="app-body">
        <script>
            if (localStorage.getItem('geo-sidebar-collapsed') === 'false') {
                document.write('<aside class="sidebar no-transition" aria-label="Controls panel" aria-hidden="false">');
            } else {
                document.write('<aside class="sidebar sidebar-collapsed no-transition" aria-label="Controls panel" aria-hidden="true">');
            }
        </script>
            <section id="imageModeSection">
                <!-- Group 1: Import/Export Config (general purpose) -->
                <div class="control-group control-group-io">
                    <button id="importBtn" data-tooltip="Import configuration (json)" data-i18n-tooltip="config.import.tooltip">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14"><path d="M8 1l3 3-3 4.5-3-4.5z"/><path d="M8 8.5v2.5"/><path d="M3 13l2-2h6l2 2"/></svg>
                        <span data-i18n="config.import">Import Config</span>
                    </button>
                    <button id="exportBtn" disabled data-tooltip="Export configuration (json)" data-i18n-tooltip="config.export.tooltip">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14"><path d="M8 15l3-3-3-4.5-3 4.5z"/><path d="M8 7.5V5"/><path d="M3 3l2 2h6l2-2"/></svg>
                        <span data-i18n="config.export">Export Config</span>
                    </button>
                </div>

                <!-- Group 2: Config Utility (general purpose, icon-only) -->
                <div class="control-group control-group-utility">
                    <button id="saveProfile" disabled data-tooltip="Save as user profile (local storage)" data-i18n-tooltip="profile.save.tooltip">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14"><path d="M2 2h8l4 4v8H2z"/><path d="M10 2v4h4"/><rect x="5" y="2" width="4" height="3" rx="0.5" stroke-width="1"/><rect x="4.5" y="9" width="7" height="5" rx="0.5" stroke-width="1"/></svg>
                    </button>
                    <button id="resetProfile" disabled data-tooltip="Reset changes" data-i18n-tooltip="profile.reset.tooltip">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14"><path d="M8 4.5l2.5 2.5L8 10 5.5 7z"/><path d="M2 8a6 6 0 1 1 2 4.5" stroke-linecap="round"/><path d="M1 10l1 2.5 2.5-1" stroke-linecap="round"/></svg>
                    </button>
                    <button id="panelRandomizeBtn" data-tooltip="Randomize image" data-i18n-tooltip="stage.randomize">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14"><rect x="2" y="2" width="12" height="12" rx="1.5"/><circle cx="5.5" cy="4.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="5.5" cy="8" r="0.9" fill="currentColor" stroke="none"/><circle cx="5.5" cy="11.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="10.5" cy="4.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="10.5" cy="8" r="0.9" fill="currentColor" stroke="none"/><circle cx="10.5" cy="11.5" r="0.9" fill="currentColor" stroke="none"/></svg>
                    </button>
                </div>

                <!-- Group 3: Geometric Interior Configuration -->
                <div class="control-group" id="configControls">

                <div class="row">
                    <label><span class="label-info" data-tooltip="A name for this arrangement of light and form." data-label="Name" data-i18n="control.name" data-i18n-tooltip="control.name.tooltip" data-i18n-label="control.name"><span class="info-icon">i</span>Name</span></label>
                    <textarea id="profileNameField" class="auto-grow" rows="1" maxlength="40"
                        placeholder="e.g. Violet Crystalline" data-i18n-placeholder="control.name.placeholder"></textarea>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="A three-word compositional seed. Each word controls an independent random stream and visual bias." data-label="Seed" data-i18n="control.seed" data-i18n-tooltip="control.seed.tooltip" data-i18n-label="control.seed"><span class="info-icon">i</span>Seed</span></label>
                    <div class="seed-tag-row" id="seedTagRow">
                        <select id="seedTagArr" class="select-base seed-tag-select"></select>
                        <span class="seed-tag-sep">&middot;</span>
                        <select id="seedTagStr" class="select-base seed-tag-select"></select>
                        <span class="seed-tag-sep">&middot;</span>
                        <select id="seedTagDet" class="select-base seed-tag-select"></select>
                    </div>
                </div>

                <!-- ── Geometry ── -->
                <div class="param-section-header" data-target="geometryRows" aria-expanded="true">
                    <span class="label-info" data-tooltip="The physical character of forms &mdash; their abundance, fragmentation, granularity, and crystal quality." data-i18n="section.geometry" data-i18n-tooltip="section.geometry.tooltip"><span class="info-icon">i</span>Geometry</span>
                    <span class="collapsible-chevron">&#9662;</span>
                </div>
                <div class="param-section-rows" id="geometryRows">

                <div class="row">
                    <label><span class="label-info" data-tooltip="How thickly forms crowd the void." data-label="Density" data-i18n="control.density" data-i18n-tooltip="control.density.tooltip" data-i18n-label="control.density"><span class="info-icon">i</span>Density</span> <span id="densityLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="densityTrack"></div>
                        <input id="density" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How forms break and splinter through space." data-label="Fracture" data-i18n="control.fracture" data-i18n-tooltip="control.fracture.tooltip" data-i18n-label="control.fracture"><span class="info-icon">i</span>Fracture</span> <span id="fractureLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="fractureTrack"></div>
                        <input id="fracture" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="The relative magnitude of forms — monumental to atmospheric." data-label="Scale" data-i18n="control.scale" data-i18n-tooltip="control.scale.tooltip" data-i18n-label="control.scale"><span class="info-icon">i</span>Scale</span> <span id="scaleLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="scaleTrack"></div>
                        <input id="scale" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How the envelope subdivides into lobes and grooves." data-label="Division" data-i18n="control.division" data-i18n-tooltip="control.division.tooltip" data-i18n-label="control.division"><span class="info-icon">i</span>Division</span> <span id="divisionLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="divisionTrack"></div>
                        <input id="division" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="The angularity of folded surfaces — flat panels to sharp shards." data-label="Faceting" data-i18n="control.faceting" data-i18n-tooltip="control.faceting.tooltip" data-i18n-label="control.faceting"><span class="info-icon">i</span>Faceting</span> <span id="facetingLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="facetingTrack"></div>
                        <input id="faceting" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                </div>

                <!-- ── Light ── -->
                <div class="param-section-header" data-target="lightRows" aria-expanded="true">
                    <span class="label-info" data-tooltip="The energy and radiance of the scene." data-i18n="section.light" data-i18n-tooltip="section.light.tooltip"><span class="info-icon">i</span>Light</span>
                    <span class="collapsible-chevron">&#9662;</span>
                </div>
                <div class="param-section-rows" id="lightRows">

                <div class="row">
                    <label><span class="label-info" data-tooltip="The inner radiance of the scene." data-label="Luminosity" data-i18n="control.luminosity" data-i18n-tooltip="control.luminosity.tooltip" data-i18n-label="control.luminosity"><span class="info-icon">i</span>Luminosity</span> <span id="luminosityLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="luminosityTrack"></div>
                        <input id="luminosity" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How far light reaches beyond its sources &mdash; tight crystal points to soft atmospheric halos." data-label="Bloom" data-i18n="control.bloom" data-i18n-tooltip="control.bloom.tooltip" data-i18n-label="control.bloom"><span class="info-icon">i</span>Bloom</span> <span id="bloomLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="bloomTrack" style="background: linear-gradient(to right, #4488cc, #e8c88a)"></div>
                        <input id="bloom" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                </div>

                <!-- ── Color ── -->
                <div class="param-section-header" data-target="colorRows" aria-expanded="true">
                    <span class="label-info" data-tooltip="The chromatic identity of the emitted light &mdash; hue, spectral range, and intensity." data-i18n="section.color" data-i18n-tooltip="section.color.tooltip"><span class="info-icon">i</span>Color</span>
                    <span class="collapsible-chevron">&#9662;</span>
                </div>
                <div class="param-section-rows" id="colorRows">

                <div class="row">
                    <label><span class="label-info" data-tooltip="Where on the spectrum the light begins." data-label="Hue" data-i18n="control.hue" data-i18n-tooltip="control.hue.tooltip" data-i18n-label="control.hue"><span class="info-icon">i</span>Hue</span> <span id="hueLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" style="background: linear-gradient(to right, hsl(0,70%,50%), hsl(60,70%,50%), hsl(120,70%,50%), hsl(180,70%,50%), hsl(240,70%,50%), hsl(300,70%,50%), hsl(360,70%,50%))"></div>
                        <input id="hue" type="range" min="0" max="1" step="0.01" value="0.78" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How far color is allowed to wander from its origin." data-label="Spectrum" data-i18n="control.spectrum" data-i18n-tooltip="control.spectrum.tooltip" data-i18n-label="control.spectrum"><span class="info-icon">i</span>Spectrum</span> <span id="spectrumLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="spectrumTrack"></div>
                        <input id="spectrum" type="range" min="0" max="1" step="0.01" value="0.24" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="The purity of pigment — dusty whisper to liquid jewel." data-label="Chroma" data-i18n="control.chroma" data-i18n-tooltip="control.chroma.tooltip" data-i18n-label="control.chroma"><span class="info-icon">i</span>Chroma</span> <span id="chromaLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="chromaTrack"></div>
                        <input id="chroma" type="range" min="0" max="1" step="0.01" value="0.42" />
                    </div>
                </div>

                </div>

                <!-- ── Space ── -->
                <div class="param-section-header" data-target="spaceRows" aria-expanded="true">
                    <span class="label-info" data-tooltip="The directional organization of forms &mdash; flow patterns and structural coherence." data-i18n="section.space" data-i18n-tooltip="section.space.tooltip"><span class="info-icon">i</span>Space</span>
                    <span class="collapsible-chevron">&#9662;</span>
                </div>
                <div class="param-section-rows" id="spaceRows">

                <div class="row">
                    <label><span class="label-info" data-tooltip="The discipline binding form to structure." data-label="Coherence" data-i18n="control.coherence" data-i18n-tooltip="control.coherence.tooltip" data-i18n-label="control.coherence"><span class="info-icon">i</span>Coherence</span> <span id="coherenceLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="coherenceTrack"></div>
                        <input id="coherence" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="The directional field pattern — radial starburst to noise to orbital bands." data-label="Flow" data-i18n="control.flow" data-i18n-tooltip="control.flow.tooltip" data-i18n-label="control.flow"><span class="info-icon">i</span>Flow</span> <span id="flowLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="flowTrack"></div>
                        <input id="flow" type="range" min="0" max="1" step="0.01" value="0.50" />
                    </div>
                </div>

                </div>

                </div>

                <!-- Group 4: Camera Position -->
                <div class="control-group" id="cameraGroup">
                <div class="param-section-header" data-target="cameraRows" aria-expanded="true" style="border-top: none; margin-top: 0;">
                    <span class="label-info" data-tooltip="The still eye of the scene — distance, orbit, and elevation." data-i18n="section.camera" data-i18n-tooltip="section.camera.tooltip"><span class="info-icon">i</span>Camera</span>
                    <span class="collapsible-chevron">&#9662;</span>
                </div>
                <div class="param-section-rows" id="cameraRows">

                <div class="row">
                    <label><span class="label-info" data-tooltip="The horizontal orbit — a slow revolution around the forms." data-label="Rotation" data-i18n="control.rotation" data-i18n-tooltip="control.rotation.tooltip" data-i18n-label="control.rotation"><span class="info-icon">i</span>Rotation</span> <span id="rotationLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="rotationTrack" style="background: linear-gradient(to right, #6090cc, #8050cc, #6090cc)"></div>
                        <input id="rotation" type="range" min="-180" max="180" step="1" value="0" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How far the gaze rises or descends — from beneath the forms to above their canopy." data-label="Elevation" data-i18n="control.elevation" data-i18n-tooltip="control.elevation.tooltip" data-i18n-label="control.elevation"><span class="info-icon">i</span>Elevation</span> <span id="elevationLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="elevationTrack" style="background: linear-gradient(to right, #6090cc, #8050cc, #6090cc)"></div>
                        <input id="elevation" type="range" min="-180" max="180" step="1" value="0" />
                    </div>
                </div>

                <div class="row">
                    <label><span class="label-info" data-tooltip="How close the viewpoint is — higher values bring the view closer to the forms." data-label="Zoom" data-i18n="control.zoom" data-i18n-tooltip="control.zoom.tooltip" data-i18n-label="control.zoom"><span class="info-icon">i</span>Zoom</span> <span id="zoomLabel" class="slider-value"></span></label>
                    <div class="engine-slider">
                        <div class="slider-track-bg" id="zoomTrack" style="background: linear-gradient(to right, #d4a048, #6090cc)"></div>
                        <input id="zoom" type="range" min="0" max="1" step="0.01" value="0.38" />
                    </div>
                </div>

                </div>

                </div>

                <div class="gallery-wrapper">
                    <div class="gallery-header" id="galleryToggle" aria-expanded="true">
                        <span class="collapsible-label" data-i18n="gallery.imageGallery">Image Gallery</span>
                        <span class="gallery-header-right">
                            <span class="collapsible-chevron">&#9662;</span>
                        </span>
                    </div>
                    <div id="galleryContent">
                        <div class="gallery-section">
                            <div class="gallery-section-header" data-target="portraitGallery" aria-expanded="true">
                                <span class="gallery-section-label" data-i18n="gallery.portraits">Portraits</span>
                                <span class="collapsible-chevron">&#9662;</span>
                            </div>
                            <div id="portraitGallery" class="profile-gallery"></div>
                        </div>
                        <div class="gallery-section">
                            <div class="gallery-section-header" data-target="userGallery" aria-expanded="true">
                                <span class="gallery-section-label" data-i18n="gallery.savedLocal">Saved (local)</span>
                                <span class="collapsible-chevron">&#9662;</span>
                            </div>
                            <div id="userGallery" class="profile-gallery"></div>
                        </div>
                    </div>
                </div>

            </section>

        </aside>
        <div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>

        <main class="stage">
            <div class="stage-content">
                <div class="stage-header">
                    <div class="stage-header-info">
                        <div class="display-name" id="displayName"></div>
                        <div class="display-intent" id="displayIntent"></div>
                    </div>
                    <div class="stage-header-btns">
                        <button id="historyBackBtn" data-tooltip="Previous image (view history)" data-i18n-tooltip="stage.prevHistory" disabled>
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                                <path d="M10 3L5 8l5 5"/>
                            </svg>
                        </button>
                        <button class="config-randomize-btn" id="configRandomizeBtn"
                                data-tooltip="Randomize image" data-i18n-tooltip="stage.randomize">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" width="14" height="14">
                                <rect x="2" y="2" width="12" height="12" rx="1.5"/>
                                <circle cx="5.5" cy="4.5" r="0.9" fill="currentColor" stroke="none"/>
                                <circle cx="5.5" cy="8" r="0.9" fill="currentColor" stroke="none"/>
                                <circle cx="5.5" cy="11.5" r="0.9" fill="currentColor" stroke="none"/>
                                <circle cx="10.5" cy="4.5" r="0.9" fill="currentColor" stroke="none"/>
                                <circle cx="10.5" cy="8" r="0.9" fill="currentColor" stroke="none"/>
                                <circle cx="10.5" cy="11.5" r="0.9" fill="currentColor" stroke="none"/>
                            </svg>
                        </button>
                        <button id="historyForwardBtn" data-tooltip="Next image (view history)" data-i18n-tooltip="stage.nextHistory" disabled>
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                                <path d="M6 3l5 5-5 5"/>
                            </svg>
                        </button>
                        <span class="stage-header-sep"></span>
                        <div class="settings-btn-wrap">
                            <button id="settingsBtn" data-tooltip="Settings" data-i18n-tooltip="stage.settings">
                                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                                    <circle cx="8" cy="8" r="2"/>
                                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.93 2.93l1.41 1.41M11.66 11.66l1.41 1.41M13.07 2.93l-1.41 1.41M4.34 11.66l-1.41 1.41"/>
                                </svg>
                            </button>
                            <div id="settingsPopover" class="settings-popover hidden">
                                <!-- Image editor: no animation toggle or config -->
                            </div>
                        </div>
                        <div class="share-btn-wrap" id="shareWrap"></div>
                    </div>
                </div>
                <div class="render-card" id="renderCard">
                    <div class="canvas-wrapper">
                        <canvas id="c" width="1400" height="900"></canvas>
                        <div id="canvasOverlay" class="canvas-overlay">
                            <div class="canvas-overlay-inner">
                                <div class="canvas-overlay-spinner"></div>
                                <span id="canvasOverlayText" class="canvas-overlay-text"></span>
                            </div>
                        </div>
                        <!-- morph timebar removed for image editor -->
                    </div>
                    <div class="generated-text-wrap" id="textWrap">
                        <div class="generated-text-inner" id="textInner">
                            <div class="generated-title" id="titleText"></div>
                            <div class="generated-alt" id="altText"></div>
                        </div>
                    </div>
                </div>
            </div>

        <footer class="app-footer"></footer>
        </main>
    </div>
    </div>

    <!-- Import modal (page-specific) -->
    <div id="importModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
        <div class="modal-box" style="max-width: 30rem;">
            <div class="modal-header">
                <span class="modal-title">Import Profile</span>
                <button id="importModalClose" class="modal-close" aria-label="Close">
                    <div class="panel-toggle-icon">
                        <span class="bar bar-top"></span>
                        <span class="bar bar-mid"></span>
                        <span class="bar bar-bot"></span>
                    </div>
                </button>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <div class="section-label">Upload JSON file</div>
                    <label class="file-drop-zone" id="fileDropZone" for="importFile">
                        <input type="file" id="importFile" accept=".json,application/json" />
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span class="file-drop-text">Choose file or drag here</span>
                        <span class="file-drop-name" id="fileDropName"></span>
                    </label>
                </div>
                <div style="text-align: center; font-size: 0.6875rem; color: var(--text-muted);">or</div>
                <div>
                    <div class="section-label">Paste JSON</div>
                    <textarea id="importJson" rows="8" placeholder='{"Profile Name": {"seed": "...", "controls": {...}}}'></textarea>
                </div>
                <div id="importError" style="font-size: 0.75rem; color: #ff6666; display: none;"></div>
                <div class="confirm-actions">
                    <button id="importCancelBtn">Cancel</button>
                    <button id="importConfirmBtn" class="primary">Import</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared modals, toast, tooltip created by JS (src/components/create-shared-dom.js) -->
    <script type="module" src="/src/pages/image/image-main.js"></script>
</body>

</html>
