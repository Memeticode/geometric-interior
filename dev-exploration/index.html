<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dev Exploration — Geometric Interior</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d12;
            color: #e9eefc;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 400;
            color: rgb(180, 130, 255);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }
        .subtitle {
            font-size: 0.8rem;
            color: rgba(233, 238, 252, 0.4);
            margin-bottom: 3rem;
        }
        .experiments {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }
        a {
            display: block;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #e9eefc;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s;
        }
        a:hover {
            border-color: rgba(180, 130, 255, 0.4);
            background: rgba(180, 130, 255, 0.05);
        }
        a .name {
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        a .desc {
            font-size: 0.75rem;
            color: rgba(233, 238, 252, 0.45);
        }
        .back {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: rgba(233, 238, 252, 0.35);
            text-decoration: none;
            border: none;
            background: none;
        }
        .back:hover { color: rgb(180, 130, 255); background: none; border: none; }
    </style>
</head>
<body>
    <h1>Dev Exploration</h1>
    <p class="subtitle">Self-contained experiments for alternative browsing experiences</p>
    <div class="experiments">
        <a href="constellation.html">
            <div class="name">Constellation</div>
            <div class="desc">Profiles as luminous nodes in a dark field, positioned by parameter similarity</div>
        </a>
    </div>
    <a class="back" href="/">&larr; Back to Gallery</a>
</body>
</html>
